<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNK Inmobiliaria - Dashboard Gestor Inmobiliario</title>
    <meta name="description" content="Dashboard para gestores inmobiliarios en PNK Inmobiliaria. Gestiona propiedades en venta y alquiler en la Región de Coquimbo.">
    <meta name="keywords" content="dashboard gestor inmobiliario, gestionar propiedades Coquimbo, panel gestor PNK">
    <meta name="author" content="PNK Inmobiliaria">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://www.pnk-inmobiliaria.cl/dashboard/dashboard-gestor.html">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
        }
    
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
    
        .card {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #9e3c3c;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 10px 15px 5px rgba(0, 0, 0, 0.1);
        }
    
        .card h3 {
            margin-bottom: 15px;
            color: #000000;
        }
    
        .card a,
        .card button {
            display: inline-block;
            padding: 10px 20px;
            color: #ffffff;
            background-color: #0044ff;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
        }

        .card a:hover,
        .card button:hover {
            background-color: #0056b3;
        }
    </style>

</head>
<body>
    <header>
        <h1>PNK Inmobiliaria</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="dashboard-gestor.html">Dashboard</a></li>
                <li><a href="../login.html">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
        <h2 id="dashboard-title" style="color: black;">Gestión de Propiedades</h2>
            <div class="dashboard" role="region" aria-labelledby="dashboard-title">
                <article class="card">
                    <h3>Registrar Propiedad</h3>
                    <a href="../register/register-propiedad.html">Ir a Registrar</a>
                </article>
                <article class="card">
                    <h3>Ofertar Propiedades</h3>
                    <a href="#">Ver Propiedades Disponibles</a>
                </article>
                <article class="card">
                    <h3>Mis Ofertas</h3>
                    <a href="#">Ver Mis Ofertas</a>
                </article>
                <article class="card">
                    <h3>Perfil</h3>
                    <a href="#">Editar Perfil</a>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PNK Inmobiliaria. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
