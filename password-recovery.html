    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>PNK Inmobiliaria</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Iniciar Sesión</a></li>
                <li><a href="register/register-gestor.html">Registrar Gestor</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Recuperar Contraseña</h2>
            <form action="#" method="post">
                <label for="recovery-email">Correo Electrónico:</label>
                <input type="email" id="recovery-email" name="email" required aria-describedby="recovery-help">
                <span id="recovery-help" class="sr-only">Ingresa el correo electrónico asociado a tu cuenta para recibir instrucciones</span>

                <button type="submit">Enviar Instrucciones</button>
            </form>
            <p><a href="login.html">Volver al Inicio de Sesión</a></p>
        </section>
    </main>
